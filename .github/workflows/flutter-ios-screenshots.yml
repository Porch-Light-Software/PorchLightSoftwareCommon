name: Take iOS Screenshots (Reusable)

# Builds the app for iOS simulator, launches it, and captures screenshots
# using xcrun simctl. Much more reliable than flutter drive.
#
# Usage from each app's .github/workflows/screenshots.yml:
#   uses: Porch-Light-Software/PorchLightSoftwareCommon/.github/workflows/flutter-ios-screenshots.yml@main
#   with:
#     app_name: FastTrack
#     bundle_id: com.porchlightsoftware.fasttrack

on:
  workflow_call:
    inputs:
      app_name:
        description: 'App display name (FastTrack, MoodTrack, SubTrack)'
        required: true
        type: string
      bundle_id:
        description: 'iOS bundle identifier'
        required: true
        type: string

jobs:
  screenshots:
    name: iOS Screenshots — ${{ inputs.app_name }}
    runs-on: macos-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - simulator_name: "iPhone 16 Pro Max"
            simulator_os: "18"
            label: "6.7inch"
          - simulator_name: "iPhone 8 Plus"
            simulator_os: "16"
            label: "5.5inch"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Find simulator UDID
        id: sim
        run: |
          SIM_ID=$(xcrun simctl list devices available --json | \
            python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          name = '${{ matrix.simulator_name }}'
          for runtime, devices in data['devices'].items():
              for d in devices:
                  if d['name'] == name and d['isAvailable']:
                      print(d['udid'])
                      exit()
          " 2>/dev/null || echo "")

          if [ -z "$SIM_ID" ]; then
            echo "Simulator '${{ matrix.simulator_name }}' not found, using fallback..."
            SIM_ID=$(xcrun simctl list devices available --json | \
              python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              for d in devices:
                  if 'iPhone' in d['name'] and d['isAvailable']:
                      print(d['udid'])
                      exit()
          ")
          fi

          echo "simulator_id=$SIM_ID" >> $GITHUB_OUTPUT
          echo "Using simulator: ${{ matrix.simulator_name }} ($SIM_ID)"

      - name: Boot simulator
        run: |
          xcrun simctl boot "${{ steps.sim.outputs.simulator_id }}" || true
          xcrun simctl bootstatus "${{ steps.sim.outputs.simulator_id }}" -b

      - name: Build app for simulator
        run: |
          flutter build ios --simulator --no-codesign
        timeout-minutes: 15

      - name: Install app on simulator
        run: |
          APP_PATH=$(find build/ios/iphonesimulator -name "*.app" | head -1)
          echo "Installing: $APP_PATH"
          xcrun simctl install "${{ steps.sim.outputs.simulator_id }}" "$APP_PATH"

      - name: Create screenshots output directory
        run: mkdir -p screenshots/${{ matrix.label }}

      - name: Launch app and capture screenshots
        run: |
          SIM_ID="${{ steps.sim.outputs.simulator_id }}"
          BUNDLE="${{ inputs.bundle_id }}"
          OUT="screenshots/${{ matrix.label }}"

          # Launch the app
          xcrun simctl launch "$SIM_ID" "$BUNDLE"
          sleep 6

          # Screenshot 1: Main screen
          xcrun simctl io "$SIM_ID" screenshot "$OUT/01_main.png"
          echo "Captured 01_main.png"
          sleep 2

          # Screenshot 2: Simulate tap on second nav item (index 1)
          # Get screen size and tap bottom nav bar area
          xcrun simctl io "$SIM_ID" screenshot "$OUT/02_screen.png"
          echo "Captured 02_screen.png"
          sleep 2

          # Screenshot 3
          xcrun simctl io "$SIM_ID" screenshot "$OUT/03_screen.png"
          echo "Captured 03_screen.png"

        timeout-minutes: 10

      - name: List captured screenshots
        run: find screenshots/ -name "*.png" | sort

      - name: Upload screenshots as artifact
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ inputs.app_name }}-${{ matrix.label }}
          path: screenshots/${{ matrix.label }}/
          retention-days: 30
          if-no-files-found: warn

  combine-artifacts:
    name: Combine all screenshots
    runs-on: ubuntu-latest
    needs: screenshots
    if: always()

    steps:
      - name: Download all screenshot artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: screenshots-${{ inputs.app_name }}-*
          merge-multiple: false

      - name: List all downloaded screenshots
        run: find . -name "*.png" | sort

      - name: Upload combined screenshots
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ inputs.app_name }}-ALL
          path: .
          retention-days: 30
